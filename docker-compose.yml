# ══════════════════════════════════════════════════════════════════
# Yorglass IK Chatbot API - Docker Compose
# ══════════════════════════════════════════════════════════════════
# Kullanim:
#   Baslat:  docker compose up -d
#   Durdur:  docker compose down
#   Log:     docker compose logs -f
#   Rebuild: docker compose up -d --build
# ══════════════════════════════════════════════════════════════════

services:
  ik-chatbot:
    build: .
    container_name: yorglass-ik-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
